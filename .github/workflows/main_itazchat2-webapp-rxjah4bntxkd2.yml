# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Node.js app to Azure Web App - itazchat2-webapp-rxjah4bntxkd2

on:
  push:
    branches: []
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v4
        with:
          node-version: "22.x"

      - name: Install dependencies and build Next.js
        run: |
          cd ./src
          npm ci
          npm run build
          cd ..

      - name: Prepare standalone deployment package
        run: |
          rm -rf site-deploy
          cp -R ./src/.next/standalone ./site-deploy
          cp -R ./src/.next/static ./site-deploy/.next/static
          cp -R ./src/public ./site-deploy/public

      - name: Verify export route exists in built output
        run: |
          test -f "./site-deploy/.next/server/app/(authenticated)/api/chat/export/route.js"

      - name: Zip artifact for deployment
        run: |
          cd ./site-deploy
          zip -r ../release.zip .

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: release.zip

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: Production
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: Unzip artifact for deployment
        run: unzip release.zip

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: "itazchat2-webapp-rxjah4bntxkd2"
          slot-name: "Production"
          package: .
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_8E9073291F7B4FC8B6E708FAE9CB1AAA }}
